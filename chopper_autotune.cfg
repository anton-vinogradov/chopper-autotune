[force_move]
enable_force_move: True

[gcode_shell_command chopper_tune]
command: ~/chopper-autotune/tune.sh
timeout: 86400.0
verbose: True

[gcode_shell_command chopper_collect]
command: ~/chopper-autotune/collect.sh
timeout: 86400.0
verbose: True

[gcode_shell_command chopper_analyze]
command: ~/chopper-autotune/analyze.sh
timeout: 3600.0
verbose: True

[gcode_shell_command chopper_find_speed]
command: ~/chopper-autotune/find_speed.sh
timeout: 7200.0
verbose: True

[gcode_shell_command chopper_status]
command: ~/chopper-autotune/status.sh
timeout: 60.0
verbose: True

[gcode_shell_command chopper_demo]
command: ~/chopper-autotune/demo.sh
timeout: 1200.0
verbose: True

[gcode_shell_command chopper_stop]
command: ~/chopper-autotune/stop.sh
timeout: 30.0
verbose: True

[gcode_macro CHOPPER_TUNE]
description: Tune the whole printer in one go: resonance speed + register descent per axis ([AXIS=XY SAVE=1 SPEED=.. DRY_RUN=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_tune PARAMS='{rawparams}'

[gcode_macro CHOPPER_COLLECT]
description: Collect a chopper tuning dataset (SPEED=55 [AXIS=X TBL=0:3 TOFF=1:8 HSTRT=0:7 HEND=0:15 TPFD=.. ITERATIONS=1 MEASURE_TIME=1.25 DRY_RUN=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_collect PARAMS='{rawparams}'

[gcode_macro CHOPPER_ANALYZE]
description: Rank the latest dataset, write a report, print the recommended config ([DATASET=.. TOP=15 AUDIBLE_WEIGHT=0.25 RECOMPUTE=1 APPLY=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_analyze PARAMS='{rawparams}'

[gcode_macro CHOPPER_FIND_SPEED]
description: Sweep speeds with current registers to locate resonance peaks ([AXIS=X MIN_SPEED=20 MAX_SPEED=120 STEP=2 ITERATIONS=1 DRY_RUN=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_find_speed PARAMS='{rawparams}'

[gcode_macro CHOPPER_STATUS]
description: Progress of the most recent (or given DATASET=) collection run
gcode:
    RUN_SHELL_COMMAND CMD=chopper_status PARAMS='{rawparams}'

[gcode_macro CHOPPER_DEMO]
description: Show driver defaults vs the tuned registers ([AXIS=X SPEED=.. LIVE=1 ROUNDS=3 REPEATS=4 DEFAULT=2,3,5,0]); LIVE=1 alternates them audibly
gcode:
    RUN_SHELL_COMMAND CMD=chopper_demo PARAMS='{rawparams}'

[gcode_macro CHOPPER_SHOW]
description: Audible before/after show — one tap plays defaults vs tuned on the motor ([AXIS=X ROUNDS=3])
gcode:
    {% set axis = params.AXIS|default('X') %}
    {% set rounds = params.ROUNDS|default(3) %}
    RUN_SHELL_COMMAND CMD=chopper_demo PARAMS="axis={axis} live=1 rounds={rounds}"

[gcode_macro CHOPPER_STOP]
description: Stop a running chopper-autotune job (it restores registers and re-homes on exit)
gcode:
    RUN_SHELL_COMMAND CMD=chopper_stop
