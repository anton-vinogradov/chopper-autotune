# [force_move] is NOT declared here: Klipper rejects duplicate sections and many
# configs already have one. install.sh generates chopper_force_move.cfg when needed.

[gcode_shell_command chopper_tune]
command: ~/chopper-autotune/tune.sh
timeout: 86400.0
verbose: True

[gcode_shell_command chopper_collect]
command: ~/chopper-autotune/collect.sh
timeout: 86400.0
verbose: True

[gcode_shell_command chopper_analyze]
command: ~/chopper-autotune/analyze.sh
timeout: 3600.0
verbose: True

[gcode_shell_command chopper_find_speed]
command: ~/chopper-autotune/find_speed.sh
timeout: 7200.0
verbose: True

[gcode_shell_command chopper_status]
command: ~/chopper-autotune/status.sh
timeout: 60.0
verbose: True

[gcode_shell_command chopper_demo]
command: ~/chopper-autotune/demo.sh
timeout: 1200.0
verbose: True

[gcode_shell_command chopper_stop]
command: ~/chopper-autotune/stop.sh
timeout: 30.0
verbose: True

[gcode_shell_command chopper_save]
command: ~/chopper-autotune/save.sh
timeout: 120.0
verbose: True

[gcode_shell_command chopper_current]
command: ~/chopper-autotune/current.sh
timeout: 7200.0
verbose: True

[gcode_shell_command chopper_envelope]
command: ~/chopper-autotune/envelope.sh
timeout: 7200.0
verbose: True

[gcode_shell_command chopper_map]
command: ~/chopper-autotune/map.sh
timeout: 7200.0
verbose: True

[gcode_macro CHOPPER_CURRENT]
description: Find the minimal safe run current per motor: worst-case stress + endstop referee ([MOTOR=AB MARGIN=2.0 SAVE=1 DRY_RUN=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_current PARAMS='{rawparams}'

[gcode_macro CHOPPER_ENVELOPE]
description: Motor torque ceiling — top speed and acceleration before skipped steps, at the configured current ([MOTOR=AB MIN_SPEED=150 MAX_SPEED=350 STEP=50 ACCEL_PROBE_SPEED=150 DRY_RUN=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_envelope PARAMS='{rawparams}'

[gcode_macro CHOPPER_MAP]
description: Resonance map — vibration vs speed on the current registers, which speeds ring (VFAs) vs stay quiet ([MOTOR=A MIN_SPEED=20 MAX_SPEED=250 STEP=10 PRINT_SPEED=200 DRY_RUN=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_map PARAMS='{rawparams}'

[gcode_macro CHOPPER_TUNE]
description: Tune the whole printer in one go: resonance speed + register descent per motor ([MOTOR=AB SAVE=1 SPEED=.. DRY_RUN=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_tune PARAMS='{rawparams}'

[gcode_macro CHOPPER_COLLECT]
description: Collect a chopper tuning dataset (SPEED=55 [MOTOR=A TBL=0:3 TOFF=1:8 HSTRT=0:7 HEND=0:15 TPFD=.. ITERATIONS=1 MEASURE_TIME=1.25 DRY_RUN=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_collect PARAMS='{rawparams}'

[gcode_macro CHOPPER_ANALYZE]
description: Rank the latest dataset, write a report, print the recommended config ([DATASET=.. TOP=15 AUDIBLE_WEIGHT=0.25 RECOMPUTE=1 APPLY=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_analyze PARAMS='{rawparams}'

[gcode_macro CHOPPER_FIND_SPEED]
description: Sweep speeds with current registers to locate resonance peaks ([MOTOR=A MIN_SPEED=20 MAX_SPEED=120 STEP=2 ITERATIONS=1 DRY_RUN=1])
gcode:
    RUN_SHELL_COMMAND CMD=chopper_find_speed PARAMS='{rawparams}'

[gcode_macro CHOPPER_STATUS]
description: Progress of the most recent (or given DATASET=) collection run
gcode:
    RUN_SHELL_COMMAND CMD=chopper_status PARAMS='{rawparams}'

[gcode_macro CHOPPER_DEMO]
description: Audible before/after show — plays defaults vs the tuned registers ([MOTOR=AB both by default, or A/B SPEED=.. ROUNDS=3 REPEATS=4]); REPORT=1 prints the measured numbers instead
gcode:
    RUN_SHELL_COMMAND CMD=chopper_demo PARAMS='{rawparams}'

[gcode_macro CHOPPER_SAVE]
description: Save the latest tuning result for each motor into the config (backup first) and restart Klipper
gcode:
    RUN_SHELL_COMMAND CMD=chopper_save PARAMS='{rawparams}'

[gcode_macro CHOPPER_STOP]
description: Stop a running chopper-autotune job (it restores registers and re-homes on exit)
gcode:
    RUN_SHELL_COMMAND CMD=chopper_stop
